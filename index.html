  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 13px; color: #1C1C1A; background: white; padding: 40px; max-width: 800px; margin: 0 auto; }
  @media print {
    body { padding: 20px; }
    .no-print { display: none !important; }
  }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 2px solid #1C1C1A; }
  .brand { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .brand-sub { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #8C8C86; margin-top: 2px; }
  .invoice-meta { text-align: right; }
  .invoice-num { font-size: 18px; font-weight: 700; color: #C8860A; font-family: monospace; }
  .invoice-date { font-size: 11px; color: #8C8C86; margin-top: 4px; }
  .parties { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 28px; }
  .party-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: #8C8C86; margin-bottom: 6px; }
  .party-name { font-size: 15px; font-weight: 600; }
  .party-detail { font-size: 12px; color: #4A4A46; margin-top: 2px; }
  .week-banner { background: #FDF3DC; border-left: 3px solid #C8860A; padding: 10px 14px; margin-bottom: 24px; font-size: 12px; color: #7a5100; }
  .week-banner strong { font-size: 14px; }
  table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
  thead th { font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; color: #8C8C86; text-align: left; padding: 8px 12px; border-bottom: 2px solid #DDD8CE; }
  thead th:nth-child(3), thead th:nth-child(4), thead th:nth-child(5) { text-align: right; }
  tbody td { border-bottom: 1px solid #f0ece4; vertical-align: middle; font-size: 13px; }
  .totals { display: flex; justify-content: flex-end; }
  .totals-box { width: 260px; }
  .totals-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #DDD8CE; font-size: 13px; }
  .totals-row.grand { border-bottom: none; padding-top: 10px; font-size: 16px; font-weight: 700; }
  .totals-row.grand span:last-child { color: #C8860A; font-family: monospace; }
  .footer { margin-top: 40px; padding-top: 20px; border-top: 1px solid #DDD8CE; font-size: 11px; color: #8C8C86; text-align: center; }
  .status-paid { display: inline-block; border: 2px solid #2D6A4F; color: #2D6A4F; padding: 4px 16px; border-radius: 2px; font-weight: 700; font-size: 12px; letter-spacing: 2px; transform: rotate(-2deg); margin-top: 16px; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="brand">Commissary</div>
      <div class="brand-sub">ENC Ordering System</div>
    </div>
    <div class="invoice-meta">
      <div class="invoice-num">${invoiceNum}</div>
      <div class="invoice-date">Issued ${today}</div>
    </div>
  </div>

  <div class="parties">
    <div>
      <div class="party-label">From</div>
      <div class="party-name">ENC Commissary</div>
      <div class="party-detail">commissary@enc.com</div>
    </div>
    <div>
      <div class="party-label">Bill To</div>
      <div class="party-name">${restaurant.name}</div>
      <div class="party-detail">${restaurant.email}</div>
    </div>
  </div>

  <div class="week-banner">
    <strong>Week of ${weekRange}</strong><br>
    ${orders.length} order${orders.length !== 1 ? 's' : ''} · ${orders.filter(o => o.status === 'fulfilled').length} fulfilled
  </div>

  <table>
    <thead>
      <tr>
        <th>Item</th>
        <th>Category</th>
        <th style="text-align:center;">Qty</th>

  <div class="totals">

      <div class="totals-row grand"><span>Total Due</span><span>${fmt(grandTotal)}</span></div>

}

function downloadInvoice() {
  const { restaurant, orders, weekStart, weekEnd, grandTotal } = getReportData(reportRestaurantId, reportWeekStart);
  const invoiceNum = 'INV-' + weekStartStr(weekStart).replace(/-/g,'') + '-' + restaurant.name.replace(/[^A-Z0-9]/gi,'').substring(0,4).toUpperCase();
  const orderRows = buildOrderRows(orders);
  const html = buildInvoiceHTML({ restaurant, orders, weekStart, weekEnd, grandTotal, invoiceNum, orderRows });

  // Open in new window and trigger print-to-PDF
  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
  win.focus();
  setTimeout(() => win.print(), 500);
}

function buildOrderRows(orders) {
  let rows = '';
  if (orders.length === 0) {
    return `<tr><td colspan="5" style="text-align:center;color:#888;padding:24px;">No orders this week</td></tr>`;
  }
  orders.forEach((o, idx) => {
    if (idx > 0) rows += `<tr><td colspan="5" style="padding:0;border:none;height:8px;"></td></tr>`;
    rows += `<tr style="background:#f9f6f0;">
      <td colspan="4" style="padding:8px 12px;font-weight:600;font-size:12px;letter-spacing:1px;color:#8C8C86;border-bottom:1px solid #DDD8CE;">
        DELIVERY ${o.deliveryDate} · ${o.status === 'fulfilled' ? '✓ Fulfilled' : '⏳ Pending'}
      </td>
      <td style="padding:8px 12px;background:#f9f6f0;border-bottom:1px solid #DDD8CE;"></td>
    </tr>`;
    o.items.forEach(li => {
      const it = getItem(li.itemId);
      if (!it) return;
      rows += `<tr>
        <td style="padding:8px 12px;">${it.name}</td>
        <td style="padding:8px 12px;color:#8C8C86;">${it.category}</td>
        <td style="padding:8px 12px;text-align:center;">${li.qty} ${it.unit}</td>
        <td style="padding:8px 12px;text-align:right;font-family:monospace;">${fmt(it.price)}</td>
        <td style="padding:8px 12px;text-align:right;font-family:monospace;font-weight:600;">${fmt(it.price * li.qty)}</td>
      </tr>`;
    });
    rows += `<tr style="background:#FDF3DC;">
      <td colspan="4" style="padding:6px 12px;text-align:right;font-size:12px;color:#8C8C86;letter-spacing:0.5px;">ORDER SUBTOTAL</td>
      <td style="padding:6px 12px;text-align:right;font-family:monospace;font-weight:700;color:#C8860A;">${fmt(orderTotal(o))}</td>
    </tr>`;
  });
  return rows;
}

function emailInvoice() {
  const { restaurant, orders, weekStart, weekEnd, grandTotal } = getReportData(reportRestaurantId, reportWeekStart);
  const invoiceNum = 'INV-' + weekStartStr(weekStart).replace(/-/g,'') + '-' + restaurant.name.replace(/[^A-Z0-9]/gi,'').substring(0,4).toUpperCase();
  const weekRange = formatDate(weekStartStr(weekStart)) + ' – ' + formatDate(weekStartStr(weekEnd));

  let body = `Hi ${restaurant.name},\n\nPlease find your weekly invoice from ENC Commissary below.\n\n`;
  body += `Invoice: ${invoiceNum}\nWeek: ${weekRange}\n\n`;
  body += '='.repeat(50) + '\n\n';

  if (orders.length === 0) {
    body += 'No orders this week.\n';
  } else {
    orders.forEach(o => {
      body += `Delivery ${o.deliveryDate} (${o.status})\n` + '-'.repeat(30) + '\n';
      o.items.forEach(li => {
        const it = getItem(li.itemId);
        body += `  ${it ? it.name : '?'} — ${li.qty} ${it ? it.unit : ''}  ${it ? fmt(it.price * li.qty) : ''}\n`;
      });
      body += `  Subtotal: ${fmt(orderTotal(o))}\n\n`;
    });
    body += '='.repeat(50) + '\n';
    body += `TOTAL DUE: ${fmt(grandTotal)}\n`;
  }

  body += '\nThank you for your business!\nENC Commissary';

  const subject = `Invoice ${invoiceNum} — Week of ${weekRange}`;
  window.location.href = `mailto:${encodeURIComponent(restaurant.email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}


function buildOrderEmailBody() {
  const tomorrow = deliveryDate(1);
  const pendingOrders = DB.orders.filter(o => o.status === 'pending' && o.deliveryDate === tomorrow);
  if (pendingOrders.length === 0) return { subject: 'ENC Orders – No orders for ' + formatDate(tomorrow), body: 'No orders placed for ' + formatDate(tomorrow) + '.' };
  let body = 'ENC ORDERING SYSTEM — Orders for ' + formatDate(tomorrow) + '\n' + '='.repeat(50) + '\n\n';
  pendingOrders.forEach(o => {
    const rest = getRestaurant(o.restaurantId);
    body += (rest ? rest.name : 'Unknown') + '\n' + '-'.repeat(30) + '\n';
    o.items.forEach(li => { const it = getItem(li.itemId); body += `  ${it ? it.name : '?'} — ${li.qty} ${it ? it.unit : ''}\n`; });
    body += `  Total: ${fmt(orderTotal(o))}\n\n`;
  });
  body += '='.repeat(50) + '\nGrand Total: ' + fmt(pendingOrders.reduce((s, o) => s + orderTotal(o), 0)) + '\n' + pendingOrders.length + ' restaurant' + (pendingOrders.length !== 1 ? 's' : '') + '\n';
  return { subject: 'ENC Orders – ' + formatDate(tomorrow) + ' (' + pendingOrders.length + ' orders)', body };
}

function previewEmail() {
  const { subject, body } = buildOrderEmailBody();
  window.location.href = `mailto:${encodeURIComponent(notificationEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
}

function openSettingsModal() {
  showModal(`<div class="modal-title">Notification Settings</div>
    <p style="color:var(--mid);font-size:13px;margin-bottom:20px;">At 11:00 PM each day, your email client will open with a summary of the next day's orders ready to send.</p>
    <div class="form-group"><label class="form-label">Order Summary Email</label><input id="notify-email" class="form-input" type="email" placeholder="orders@yourcommissary.com" value="${notificationEmail}"></div>
    <div class="modal-footer"><button class="btn btn-outline" onclick="closeModal()">Cancel</button><button class="btn btn-amber" onclick="saveNotifyEmail()">Save</button></div>`);
}

function saveNotifyEmail() {
  notificationEmail = document.getElementById('notify-email').value.trim();
  localStorage.setItem('enc_notify_email', notificationEmail);
  closeModal();
  if (currentPage === 'orders') renderOrders();
}

setInterval(() => {
  const now = new Date();
  if (now.getHours() === 23 && now.getMinutes() === 0) {
    const todayKey = now.toISOString().split('T')[0];
    if (!localStorage.getItem('enc_email_sent_' + todayKey) && notificationEmail) {
      localStorage.setItem('enc_email_sent_' + todayKey, '1');
      previewEmail();
    }
  }
}, 30000);
</script>
